{% extends "main/base.html" %}

{% load i18n %}

{% block content %}
<div class="post">
    <h1>
        {% blocktranslate %}
            Are you sure you want to delete "{{ post.title }}"?
        {% endblocktranslate %}
    </h1>

    <form method="post">
        {% csrf_token %}
        <input class="btn" type="submit" value="Confirm">
    </form>
</div>
{% endblock %}
