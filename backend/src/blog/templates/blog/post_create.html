{% extends "main/base.html" %}

{% load i18n %}

{% block content %}
<div class="post">
    <h1>
        {% translate "Create post"}
    </h1>
    <form method="post">
        {% csrf_token %}

        {{ form.as_div }}

        <button class="btn" type="submit">
            {% translate "Create"}
        </button>
    </form>
</div>
{% endblock %}
